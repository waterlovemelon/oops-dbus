<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D-Bus Workbench — Full Layout Mockup</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f6f8fa;
    --bg-tertiary: #eef1f5;
    --bg-hover: #f3f4f6;
    --border: #d1d9e0;
    --border-light: #e8ecf0;
    --text-primary: #1f2328;
    --text-secondary: #59636e;
    --text-tertiary: #8b949e;
    --accent: #0969da;
    --accent-hover: #0860ca;
    --accent-light: #ddf4ff;
    --green: #1a7f37;
    --green-bg: #dafbe1;
    --purple: #8250df;
    --purple-bg: #fbefff;
    --orange: #bc4c00;
    --orange-bg: #fff8c5;
    --cyan: #0550ae;
    --cyan-bg: #ddf4ff;
    --red: #cf222e;
    --red-bg: #ffebe9;
    --radius: 8px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(31,35,40,0.04), 0 1px 2px rgba(31,35,40,0.06);
    --sidebar-width: 300px;
    --header-height: 44px;
    --transition: 0.2s ease;
    --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.5;
    height: 100vh;
    overflow: hidden;
  }

  .app { display: flex; height: 100vh; flex-direction: column; }

  .app-header {
    height: var(--header-height);
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
    z-index: 10;
  }

  .app-logo {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .app-body { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-search {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border-light);
  }

  .search-wrapper { position: relative; }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-tertiary);
    font-size: 13px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    padding: 6px 10px 6px 32px;
    font-size: 13px;
    font-family: var(--font-sans);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-secondary);
    color: var(--text-primary);
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
  }

  .search-input::placeholder { color: var(--text-tertiary); }

  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(9,105,218,0.12);
    background: var(--bg);
  }

  .sidebar-tree {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 6px 0;
  }

  .sidebar-tree::-webkit-scrollbar { width: 6px; }
  .sidebar-tree::-webkit-scrollbar-track { background: transparent; }
  .sidebar-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Tree nodes */
  .tree-node { user-select: none; }

  .tree-row {
    display: flex;
    align-items: flex-start;
    padding: 6px 12px 6px 0;
    cursor: pointer;
    transition: background 0.1s;
    min-height: 28px;
    position: relative;
  }

  .tree-row:hover { background: var(--bg-hover); }

  .tree-row.selected { background: var(--accent-light); }

  .tree-row.selected::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }

  .tree-chevron {
    width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--text-tertiary);
    font-size: 10px;
    transition: transform 0.15s;
  }

  .tree-chevron.expanded { transform: rotate(90deg); }
  .tree-chevron.leaf { visibility: hidden; }

  .tree-icon {
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-right: 6px;
    font-size: 14px;
  }

  .tree-label {
    font-size: 13px;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .tree-label.mono { font-family: var(--font-mono); font-size: 12px; }

  .tree-label-wrap { flex: 1; min-width: 0; }

  .tree-subtitle {
    font-size: 11px;
    color: var(--text-tertiary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tree-subtitle .process-cmd {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-secondary);
  }

  .tree-subtitle .inactive-text {
    color: var(--text-tertiary);
    font-style: italic;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    display: inline-block;
  }

  .status-dot.active { background: var(--green); }
  .status-dot.inactive { background: var(--border); }

  .tree-badge {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 10px;
    margin-left: 6px;
    flex-shrink: 0;
    font-weight: 500;
  }

  .tree-badge.method { background: var(--orange-bg); color: var(--orange); }
  .tree-badge.signal { background: var(--purple-bg); color: var(--purple); }
  .tree-badge.property { background: var(--cyan-bg); color: var(--cyan); }

  .tree-row .tree-chevron,
  .tree-row .tree-icon {
    margin-top: 2px;
  }

  .tree-children { display: none; }
  .tree-children.expanded { display: block; }

  .icon-service { color: var(--accent); }
  .icon-path { color: var(--green); }
  .icon-interface { color: var(--purple); }
  .icon-method { color: var(--orange); }
  .icon-signal { color: var(--purple); }
  .icon-property { color: var(--cyan); }

  /* Content Pane */
  .content-pane {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    background: var(--bg-secondary);
    padding: 24px;
    transition: opacity 0.15s ease;
  }

  .content-pane.fade-out { opacity: 0; }

  .content-pane::-webkit-scrollbar { width: 8px; }
  .content-pane::-webkit-scrollbar-track { background: transparent; }
  .content-pane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .content-inner { max-width: 780px; margin: 0 auto; }

  /* Pane Header */
  .pane-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .pane-title { font-size: 18px; font-weight: 600; color: var(--text-primary); }

  .bus-badge {
    font-size: 11px; font-weight: 500;
    padding: 2px 8px; border-radius: 12px;
    background: var(--accent-light); color: var(--accent);
    white-space: nowrap;
  }

  .scope-badge {
    font-size: 10px; font-weight: 500;
    padding: 1px 6px; border-radius: 4px;
    background: var(--bg-tertiary); color: var(--text-tertiary);
  }

  /* Section Title */
  .section-title {
    font-size: 13px; font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
    margin-top: 24px;
  }

  .section-title:first-child { margin-top: 0; }

  /* Card */
  .card {
    background: var(--bg);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 12px;
  }

  /* Metadata grid */
  .metadata-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }

  .meta-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-light);
    border-right: 1px solid var(--border-light);
  }

  .meta-item:nth-child(2n) { border-right: none; }
  .meta-item:nth-last-child(-n+2) { border-bottom: none; }

  .meta-label {
    font-size: 11px; font-weight: 500;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-bottom: 2px;
  }

  .meta-value {
    font-size: 14px; font-weight: 500;
    color: var(--text-primary);
    font-family: var(--font-mono);
  }

  .meta-value.plain { font-family: inherit; }

  /* Stats bar */
  .stats-bar {
    display: flex; gap: 16px;
    padding: 12px 16px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border-light);
    flex-wrap: wrap;
  }

  .stat-chip {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text-secondary);
  }

  .stat-icon-box {
    width: 16px; height: 16px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
  }

  .stat-icon-box.method { background: var(--orange-bg); color: var(--orange); }
  .stat-icon-box.signal { background: var(--purple-bg); color: var(--purple); }
  .stat-icon-box.property { background: var(--cyan-bg); color: var(--cyan); }
  .stat-icon-box.path { background: var(--green-bg); color: var(--green); }

  .stat-count { font-weight: 600; color: var(--text-primary); }

  /* Command Cards */
  .cmd-card {
    background: var(--bg);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 12px;
    overflow: hidden;
  }

  .cmd-card-header {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border-light);
  }

  .cmd-card-title {
    font-size: 13px; font-weight: 600;
    color: var(--text-primary);
    display: flex; align-items: center; gap: 8px;
  }

  .cmd-card-actions { display: flex; gap: 6px; align-items: center; }

  .cmd-tabs {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }

  .cmd-tab {
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 500;
    font-family: var(--font-sans);
    border: none;
    background: var(--bg);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    border-right: 1px solid var(--border);
    white-space: nowrap;
  }

  .cmd-tab:last-child { border-right: none; }
  .cmd-tab:hover { background: var(--bg-hover); }
  .cmd-tab.active { background: var(--accent); color: #fff; }

  .cmd-panel { display: none; }
  .cmd-panel.active { display: block; }

  .cmd-line {
    display: flex; align-items: center;
    padding: 10px 16px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--text-primary);
    transition: background 0.1s;
  }

  .cmd-line:hover { background: var(--bg-secondary); }

  .cmd-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cmd-text .hl { color: var(--purple); font-weight: 500; }

  .cmd-copy-btn {
    opacity: 0;
    display: flex; align-items: center; justify-content: center;
    width: 24px; height: 24px;
    border: none; background: transparent;
    color: var(--text-tertiary);
    cursor: pointer;
    border-radius: 4px;
    font-size: 12px;
    transition: all 0.15s;
    margin-left: 8px;
    flex-shrink: 0;
  }

  .cmd-line:hover .cmd-copy-btn { opacity: 1; }
  .cmd-copy-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    font-size: 13px; font-weight: 500;
    font-family: var(--font-sans);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: var(--accent-hover); }
  .btn.danger { background: var(--red); color: #fff; border-color: var(--red); }
  .btn.danger:hover { opacity: 0.9; }
  .btn.success { background: var(--green); color: #fff; border-color: var(--green); }
  .btn.success:hover { opacity: 0.9; }

  .btn-sm {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px;
    font-size: 12px; font-weight: 500;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font-sans);
  }

  .btn-sm:hover { background: var(--bg-secondary); color: var(--text-primary); }
  .btn-sm.primary { background: var(--accent); color: #fff; border-color: var(--accent); }

  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Path list */
  .path-list { list-style: none; }
  .path-item { border-bottom: 1px solid var(--border-light); }
  .path-item:last-child { border-bottom: none; }

  .path-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }

  .path-header:hover { background: var(--bg-secondary); }

  .path-chevron {
    font-size: 10px; color: var(--text-tertiary);
    transition: transform 0.2s;
    width: 12px; text-align: center;
  }

  .path-chevron.open { transform: rotate(90deg); }

  .path-icon { font-size: 12px; color: var(--green); }
  .path-name { font-family: var(--font-mono); font-size: 13px; color: var(--text-primary); flex: 1; }
  .path-count { font-size: 11px; color: var(--text-tertiary); }

  .path-children { padding: 0 16px 10px 44px; display: none; }
  .path-children.open { display: block; }

  .iface-tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; margin: 2px 4px 2px 0;
    font-size: 11px;
    font-family: var(--font-mono);
    background: var(--bg-secondary);
    border: 1px solid var(--border-light);
    border-radius: 4px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }

  .iface-tag:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

  .iface-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  /* Member table */
  .member-table { width: 100%; border-collapse: collapse; }

  .member-table th {
    text-align: left;
    font-size: 11px; font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    padding: 8px 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-light);
  }

  .member-table td {
    padding: 8px 16px;
    font-size: 13px;
    border-bottom: 1px solid var(--border-light);
    vertical-align: middle;
  }

  .member-table tr:last-child td { border-bottom: none; }
  .member-table tr:hover td { background: var(--bg-hover); }

  .member-table .name-cell {
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--text-primary);
    cursor: pointer;
  }

  .member-table .name-cell:hover { color: var(--accent); }

  .member-type-badge {
    font-size: 10px; font-weight: 500;
    padding: 2px 6px; border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .member-type-badge.method { background: var(--orange-bg); color: var(--orange); }
  .member-type-badge.signal { background: var(--purple-bg); color: var(--purple); }
  .member-type-badge.property { background: var(--cyan-bg); color: var(--cyan); }

  /* Form fields */
  .form-group { margin-bottom: 14px; }

  .form-label {
    display: block;
    font-size: 12px; font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }

  .form-label .type-hint {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-tertiary);
    font-weight: 400;
  }

  .form-input {
    width: 100%;
    padding: 6px 10px;
    font-size: 13px;
    font-family: var(--font-mono);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text-primary);
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
  }

  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(9,105,218,0.12);
  }

  .form-input::placeholder { color: var(--text-tertiary); font-family: var(--font-sans); }

  /* Result area */
  .result-area {
    background: var(--bg-secondary);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--text-primary);
    min-height: 60px;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .result-area.empty {
    color: var(--text-tertiary);
    font-family: var(--font-sans);
    font-style: italic;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .result-area.success { border-color: var(--green); background: var(--green-bg); }
  .result-area.error { border-color: var(--red); background: var(--red-bg); }

  /* dbus-send preview */
  .dbussend-preview {
    background: #0d1117;
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: #c9d1d9;
    overflow-x: auto;
    margin-top: 8px;
  }

  .dbussend-preview pre { margin: 0; white-space: pre-wrap; }

  .dbussend-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-top: 16px;
    margin-bottom: 0;
  }

  .dbussend-label {
    font-size: 11px; font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Info rows */
  .info-row { display: flex; align-items: baseline; padding: 6px 0; gap: 12px; }

  .info-label {
    font-size: 12px; font-weight: 500;
    color: var(--text-tertiary);
    min-width: 100px;
    flex-shrink: 0;
  }

  .info-value { font-size: 13px; color: var(--text-primary); font-family: var(--font-mono); }
  .info-value.plain { font-family: inherit; }

  /* Access badge */
  .access-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .access-badge.read { background: var(--green-bg); color: var(--green); }
  .access-badge.write { background: var(--orange-bg); color: var(--orange); }
  .access-badge.readwrite { background: var(--accent-light); color: var(--accent); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 20px; right: 20px;
    background: var(--text-primary);
    color: #fff;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    z-index: 100;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.2s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 800px) {
    .metadata-grid { grid-template-columns: 1fr; }
    .meta-item { border-right: none; }
  }
</style>
</head>
<body>

<div class="app">
  <header class="app-header">
    <div class="app-logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
      D-Bus Workbench
    </div>
    <span style="color:var(--text-tertiary); font-size:12px; margin-left:auto;">System Bus connected</span>
  </header>

  <div class="app-body">
    <aside class="sidebar">
      <div class="sidebar-search">
        <div class="search-wrapper">
          <span class="search-icon">&#128269;</span>
          <input class="search-input" type="text" placeholder="Filter services..." id="searchInput">
        </div>
      </div>
      <div class="sidebar-tree" id="treeContainer"></div>
    </aside>

    <main class="content-pane" id="contentPane">
      <div class="content-inner" id="contentInner"></div>
    </main>
  </div>
</div>

<div class="toast" id="toast">Copied to clipboard</div>

<script>
// ── Tree Data ──
var treeData = [

function flatten(nodes, parent) {
  for (var i = 0; i < nodes.length; i++) {
    var n = nodes[i];
    nodeMap[n.id] = { id: n.id, type: n.type, label: n.label, returns: n.returns, access: n.access, parent: parent, children: n.children, active: n.active, uniqueName: n.uniqueName, processCmd: n.processCmd, pid: n.pid };

}

// ── Render Tree ──
function renderTree(nodes, depth) {
  var html = '';
  for (var i = 0; i < nodes.length; i++) {
    var node = nodes[i];
    var hasChildren = node.children && node.children.length > 0;
    var isExpanded = hasChildren && (node.type === 'service' || node.type === 'path');
    var chevronClass = hasChildren ? (isExpanded ? 'tree-chevron expanded' : 'tree-chevron') : 'tree-chevron leaf';
    var childrenClass = isExpanded ? 'tree-children expanded' : 'tree-children';
    var icon = icons[node.type] || '';
    var badge = '';
    if (node.type === 'method') badge = '<span class="tree-badge method">M</span>';
    else if (node.type === 'signal') badge = '<span class="tree-badge signal">S</span>';
    else if (node.type === 'property') badge = '<span class="tree-badge property">P</span>';
    var indent = depth * 16 + 12;
    var labelClass = (node.type === 'path' || node.type === 'service') ? 'tree-label mono' : 'tree-label';

    html += '<div class="tree-node" data-id="' + node.id + '">';
    html += '<div class="tree-row" data-id="' + node.id + '" style="padding-left:' + indent + 'px" onclick="selectNode(\'' + node.id + '\', this)">';
    html += '<span class="' + chevronClass + '" onclick="event.stopPropagation(); toggleNode(\'' + node.id + '\', this)">&#9654;</span>';
    html += '<span class="tree-icon icon-' + node.type + '">' + icon + '</span>';

    if (node.type === 'service') {
      var isActive = node.active !== false;
      var statusDot = '<span class="status-dot ' + (isActive ? 'active' : 'inactive') + '"></span>';
      var subtitle = '';
      if (isActive && node.uniqueName) {
        subtitle = '<div class="tree-subtitle">' +
          statusDot +
          '<span>' + escapeHtml(node.uniqueName) + '</span>' +
          '<span style="color:var(--border)">|</span>' +
          '<span class="process-cmd">' + escapeHtml(node.processCmd || '') + '</span>' +
        '</div>';
      } else {
        subtitle = '<div class="tree-subtitle">' + statusDot + ' <span class="inactive-text">inactive</span></div>';
      }
      html += '<span class="tree-label-wrap">' +
        '<span class="' + labelClass + '">' + escapeHtml(node.label) + '</span>' +
        subtitle +
      '</span>';
    } else {
      html += '<span class="' + labelClass + '">' + escapeHtml(node.label) + '</span>';
    }

    html += badge;
    html += '</div>';

    if (hasChildren) {
      html += '<div class="' + childrenClass + '" data-parent="' + node.id + '">';
      html += renderTree(node.children, depth + 1);
      html += '</div>';
    }
    html += '</div>';
  }
  return html;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function initTree() {
  document.getElementById('treeContainer').textContent = '';
  var div = document.createElement('div');
  div.innerHTML = renderTree(treeData, 0);
  document.getElementById('treeContainer').appendChild(div);
}

function toggleNode(id, chevron) {
  var node = document.querySelector('.tree-node[data-id="' + id + '"]');
  var children = node.querySelector(':scope > .tree-children');
  if (!children) return;
  children.classList.toggle('expanded');
  chevron.classList.toggle('expanded');
}

function selectNode(id, row) {
  var all = document.querySelectorAll('.tree-row.selected');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('selected');
  row.classList.add('selected');

  // Expand parents
  var current = nodeMap[id];
  while (current && current.parent) {
    var parentNode = document.querySelector('.tree-node[data-id="' + current.parent + '"]');
    if (parentNode) {
      var children = parentNode.querySelector(':scope > .tree-children');
      var chevron = parentNode.querySelector(':scope > .tree-row .tree-chevron');
      if (children) children.classList.add('expanded');
      if (chevron) chevron.classList.add('expanded');
    }
    current = nodeMap[current.parent];
  }
  renderContent(id);
}

// ── Search ──
document.getElementById('searchInput').addEventListener('input', function() {
  var q = this.value.toLowerCase();
  var nodes = document.querySelectorAll('.tree-node');
  for (var i = 0; i < nodes.length; i++) {
    var label = nodes[i].querySelector(':scope > .tree-row .tree-label');
    if (!label) continue;
    var match = label.textContent.toLowerCase().indexOf(q) >= 0;
    nodes[i].style.display = match || q === '' ? '' : 'none';
  }
});

// ── Toast ──
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

function copyText(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() { showToast('Copied to clipboard'); });
  } else {
    showToast('Copied to clipboard');
  }
}

// ── Content Renderers ──
function renderContent(id) {
  var pane = document.getElementById('contentPane');
  pane.classList.add('fade-out');

  setTimeout(function() {
    var node = nodeMap[id];
    if (!node) return;
    var html = '';
    switch (node.type) {
      case 'service': html = renderServicePane(node); break;
      case 'path': html = renderPathPane(node); break;
      case 'interface': html = renderInterfacePane(node); break;
      case 'method': html = renderMethodPane(node); break;
      case 'signal': html = renderSignalPane(node); break;
      case 'property': html = renderPropertyPane(node); break;
    }
    document.getElementById('contentInner').innerHTML = html;
    pane.classList.remove('fade-out');
    pane.scrollTop = 0;
  }, 150);
}

// ── Command Card helper (tabbed) ──
var _cmdCardId = 0;

function renderCmdCard(title, scope, cmds) {
  var cardId = 'cmdcard-' + (++_cmdCardId);
  var safeTitle = title.replace(/[^a-zA-Z0-9 ]/g, '');

  // Build tabs
  var tabs = '<div class="cmd-tabs">';
  for (var i = 0; i < cmds.length; i++) {
    var activeClass = i === 0 ? ' active' : '';
    tabs += '<button class="cmd-tab' + activeClass + '" onclick="switchCmdTab(\'' + cardId + '\', ' + i + ', this)">' + cmds[i].tool + '</button>';
  }
  tabs += '</div>';

  // Build panels
  var panels = '';
  for (var i = 0; i < cmds.length; i++) {
    var c = cmds[i];
    var activeClass = i === 0 ? ' active' : '';
    var safeRaw = c.raw.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/'/g, "\\'");
    panels += '<div class="cmd-panel' + activeClass + '" data-panel="' + i + '">';
    panels += '<div class="cmd-line">';
    panels += '<span class="cmd-text">' + c.args + '</span>';
    panels += '<button class="cmd-copy-btn" title="Copy" onclick="event.stopPropagation(); copyText(\'' + safeRaw + '\')">&#128203;</button>';
    panels += '</div>';
    panels += '</div>';
  }

  return '<div class="cmd-card" id="' + cardId + '">' +
    '<div class="cmd-card-header">' +
      '<div class="cmd-card-title">' + title + ' <span class="scope-badge">' + scope + '</span></div>' +
      '<div class="cmd-card-actions">' + tabs + '</div>' +
    '</div>' +
    '<div class="cmd-body">' + panels + '</div>' +
  '</div>';
}

function switchCmdTab(cardId, index, btn) {
  var card = document.getElementById(cardId);
  if (!card) return;
  // Update tab active state
  var tabs = card.querySelectorAll('.cmd-tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  btn.classList.add('active');
  // Update panel visibility
  var panels = card.querySelectorAll('.cmd-panel');
  for (var i = 0; i < panels.length; i++) panels[i].classList.remove('active');
  var target = card.querySelector('.cmd-panel[data-panel="' + index + '"]');
  if (target) target.classList.add('active');
}

  '<div class="section-title">Monitoring Commands</div>' +
  renderCmdCard('Monitor Interface', 'interface-level', [
    { tool: 'dbus-monitor', args: 'dbus-monitor <span class="hl">"destination=\'org.freedesktop.systemd1\',path=\'' + parentPath + '\',interface=\'' + escapeHtml(node.label) + '\'"</span>', raw: 'dbus-monitor "destination=\'org.freedesktop.systemd1\',path=\'' + parentPath + '\',interface=\'' + node.label + '\'"' },
    { tool: 'busctl', args: 'busctl monitor <span class="hl">org.freedesktop.systemd1</span> <span class="hl">' + escapeHtml(parentPath) + '</span> <span class="hl">' + escapeHtml(node.label) + '</span>', raw: 'busctl monitor org.freedesktop.systemd1 ' + parentPath + ' ' + node.label },
    { tool: 'gdbus', args: 'gdbus monitor --system --dest <span class="hl">org.freedesktop.systemd1</span> --object-path <span class="hl">' + escapeHtml(parentPath) + '</span>', raw: 'gdbus monitor --system --dest org.freedesktop.systemd1 --object-path ' + parentPath }
  ]);
}

// ── Method Pane ──
function renderMethodPane(node) {
  var parentIface = nodeMap[node.parent];
  var parentPath = parentIface ? nodeMap[parentIface.parent] : null;
  var pathStr = parentPath ? parentPath.label : '/org/freedesktop/systemd1';
  var ifaceStr = parentIface ? parentIface.label : '';

  var paramInputs = '';
  if (node.label === 'GetUnit' || node.label === 'LoadUnit') {
    paramInputs = '<div class="form-group"><label class="form-label">name <span class="type-hint">(s)</span></label><input class="form-input" type="text" placeholder="e.g. &quot;dbus.service&quot;" value="dbus.service" id="arg-name"></div>';
  } else if (node.label === 'StartUnit' || node.label === 'StopUnit' || node.label === 'RestartUnit') {
    paramInputs = '<div class="form-group"><label class="form-label">name <span class="type-hint">(s)</span></label><input class="form-input" type="text" placeholder="e.g. &quot;dbus.service&quot;" value="dbus.service" id="arg-name"></div>' +
      '<div class="form-group"><label class="form-label">mode <span class="type-hint">(s)</span></label><input class="form-input" type="text" placeholder="e.g. &quot;replace&quot;" value="replace" id="arg-mode"></div>';
  } else if (node.label === 'GetUnitByPID') {
    paramInputs = '<div class="form-group"><label class="form-label">pid <span class="type-hint">(u)</span></label><input class="form-input" type="text" placeholder="e.g. &quot;1&quot;" value="1" id="arg-pid"></div>';
  } else if (node.label === 'Get') {
    paramInputs = '<div class="form-group"><label class="form-label">interface_name <span class="type-hint">(s)</span></label><input class="form-input" type="text" value="org.freedesktop.systemd1.Manager" id="arg-iface"></div>' +
      '<div class="form-group"><label class="form-label">property_name <span class="type-hint">(s)</span></label><input class="form-input" type="text" value="Version" id="arg-prop"></div>';
  } else if (node.label === 'GetAll') {
    paramInputs = '<div class="form-group"><label class="form-label">interface_name <span class="type-hint">(s)</span></label><input class="form-input" type="text" value="org.freedesktop.systemd1.Manager" id="arg-iface"></div>';
  } else {
    paramInputs = '<div style="padding:8px 0;color:var(--text-tertiary);font-size:13px;font-style:italic">No parameters required</div>';
  }

  var dbusCmd = '';
  if (node.label === 'GetUnit') {
    dbusCmd = 'dbus-send --system --print-reply --dest=org.freedesktop.systemd1 \\\n  /org/freedesktop/systemd1 \\\n  org.freedesktop.systemd1.Manager.GetUnit \\\n  string:"dbus.service"';
  } else if (node.label === 'StartUnit') {
    dbusCmd = 'dbus-send --system --print-reply --dest=org.freedesktop.systemd1 \\\n  /org/freedesktop/systemd1 \\\n  org.freedesktop.systemd1.Manager.StartUnit \\\n  string:"dbus.service" string:"replace"';
  } else if (node.label === 'StopUnit') {
    dbusCmd = 'dbus-send --system --print-reply --dest=org.freedesktop.systemd1 \\\n  /org/freedesktop/systemd1 \\\n  org.freedesktop.systemd1.Manager.StopUnit \\\n  string:"dbus.service" string:"replace"';
  } else if (node.label === 'Get') {
    dbusCmd = 'dbus-send --system --print-reply --dest=org.freedesktop.systemd1 \\\n  /org/freedesktop/systemd1 \\\n  org.freedesktop.DBus.Properties.Get \\\n  string:"org.freedesktop.systemd1.Manager" string:"Version"';
  } else if (node.label === 'GetAll') {
    dbusCmd = 'dbus-send --system --print-reply --dest=org.freedesktop.systemd1 \\\n  /org/freedesktop/systemd1 \\\n  org.freedesktop.DBus.Properties.GetAll \\\n  string:"org.freedesktop.systemd1.Manager"';
  } else {
    dbusCmd = 'dbus-send --system --print-reply --dest=org.freedesktop.systemd1 \\\n  ' + pathStr + ' \\\n  ' + ifaceStr + '.' + node.label;
  }

  var safeDbusCmd = dbusCmd.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/'/g, "\\'");

  return '<div class="pane-header">' +
    '<span class="pane-title">' + escapeHtml(node.label) + '</span>' +
    '<span class="bus-badge">System Bus</span>' +
    '<span class="tree-badge method" style="font-size:11px;padding:2px 8px">Method</span>' +
  '</div>' +

  '<div class="section-title">Method Information</div>' +
  '<div class="card" style="margin-bottom:0">' +
    '<div style="padding:12px 16px">' +
      '<div class="info-row"><span class="info-label">Interface</span><span class="info-value">' + escapeHtml(ifaceStr) + '</span></div>' +
      '<div class="info-row"><span class="info-label">Object Path</span><span class="info-value">' + escapeHtml(pathStr) + '</span></div>' +
      '<div class="info-row"><span class="info-label">Return Type</span><span class="info-value">' + (node.returns || 'void') + '</span></div>' +
    '</div>' +
  '</div>' +

  '<div class="section-title">Invoke</div>' +
  '<div class="card">' +
    '<div style="padding:16px">' +
      paramInputs +
      '<div class="btn-group" style="margin-top:4px">' +
        '<button class="btn primary" onclick="simulateInvoke()">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>' +
          ' Invoke</button>' +
        '<button class="btn" onclick="resetForm()">Reset</button>' +
        '<button class="btn" onclick="copyText(\'' + safeDbusCmd + '\')">Copy Command</button>' +
      '</div>' +
    '</div>' +
  '</div>' +

  '<div class="section-title">Result</div>' +
  '<div class="card" style="margin-bottom:0">' +
    '<div style="padding:16px">' +
      '<div class="result-area empty" id="resultArea">Invoke the method to see the result here</div>' +
    '</div>' +
  '</div>' +

  '<div class="dbussend-header">' +
    '<span class="dbussend-label">dbus-send equivalent</span>' +
    '<button class="btn-sm" onclick="copyText(\'' + safeDbusCmd + '\')">Copy</button>' +
  '</div>' +
  '<div class="dbussend-preview"><pre>' + escapeHtml(dbusCmd) + '</pre></div>';
}

// ── Signal Pane ──
function renderSignalPane(node) {
  var parentIface = nodeMap[node.parent];
  var parentPath = parentIface ? nodeMap[parentIface.parent] : null;
  var pathStr = parentPath ? parentPath.label : '/org/freedesktop/systemd1';
  var ifaceStr = parentIface ? parentIface.label : '';

  var signalDescs = {
    'UnitNew': 'Emitted when a new unit is loaded into memory. Provides the unit name (string) and the object path.',
    'UnitRemoved': 'Emitted when a unit is unloaded from memory. Provides the unit name and object path.',
    'JobNew': 'Emitted when a new job is queued. Provides the job ID, job object path, and unit object path.',
    'JobRemoved': 'Emitted when a job completes or is removed. Provides job ID, path, unit path, and result string.',
    'PropertiesChanged': 'Emitted when properties change on a D-Bus interface. Part of the standard Properties interface.'
  };

  var desc = signalDescs[node.label] || 'D-Bus signal emitted by the service.';

  var dbusCmd = "dbus-monitor --system \\\n  \"destination='org.freedesktop.systemd1',\\\ntype='signal',\\\ninterface='" + ifaceStr + "',\\\nmember='" + node.label + "'\"";
  var safeDbusCmd = dbusCmd.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/'/g, "\\'");

  return '<div class="pane-header">' +
    '<span class="pane-title">' + escapeHtml(node.label) + '</span>' +
    '<span class="bus-badge">System Bus</span>' +
    '<span class="tree-badge signal" style="font-size:11px;padding:2px 8px">Signal</span>' +
  '</div>' +

  '<div class="section-title">Signal Information</div>' +
  '<div class="card" style="margin-bottom:0">' +
    '<div style="padding:12px 16px">' +
      '<div class="info-row"><span class="info-label">Interface</span><span class="info-value">' + escapeHtml(ifaceStr) + '</span></div>' +
      '<div class="info-row"><span class="info-label">Object Path</span><span class="info-value">' + escapeHtml(pathStr) + '</span></div>' +
      '<div class="info-row"><span class="info-label">Description</span><span class="info-value plain" style="font-size:13px">' + desc + '</span></div>' +
    '</div>' +
  '</div>' +

  '<div class="section-title">Subscription</div>' +
  '<div class="card">' +
    '<div style="padding:16px; display:flex; align-items:center; gap:12px">' +
      '<button class="btn success" id="subscribeBtn" onclick="toggleSubscribe(this)">' +
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>' +
        ' Subscribe</button>' +
      '<span style="font-size:13px;color:var(--text-secondary)" id="subscribeStatus">Click to start receiving this signal</span>' +
    '</div>' +
  '</div>' +

  '<div class="section-title">Monitoring Commands</div>' +
  renderCmdCard('Monitor Signal', 'signal-level', [
    { tool: 'dbus-monitor', args: 'dbus-monitor <span class="hl">"type=\'signal\',interface=\'' + escapeHtml(ifaceStr) + '\',member=\'' + escapeHtml(node.label) + '\'"</span>', raw: 'dbus-monitor "type=\'signal\',interface=\'' + ifaceStr + '\',member=\'' + node.label + '\'"' },
    { tool: 'busctl', args: 'busctl monitor <span class="hl">org.freedesktop.systemd1</span> <span class="hl">' + escapeHtml(pathStr) + '</span> <span class="hl">' + escapeHtml(ifaceStr) + '.' + escapeHtml(node.label) + '</span>', raw: 'busctl monitor org.freedesktop.systemd1 ' + pathStr + ' ' + ifaceStr + '.' + node.label },
    { tool: 'gdbus', args: 'gdbus monitor --system --dest <span class="hl">org.freedesktop.systemd1</span>', raw: 'gdbus monitor --system --dest org.freedesktop.systemd1' }
  ]) +

  '<div class="dbussend-header">' +
    '<span class="dbussend-label">dbus-monitor filter</span>' +
    '<button class="btn-sm" onclick="copyText(\'' + safeDbusCmd + '\')">Copy</button>' +
  '</div>' +
  '<div class="dbussend-preview"><pre>' + escapeHtml(dbusCmd) + '</pre></div>';
}

// ── Property Pane ──
function renderPropertyPane(node) {
  var parentIface = nodeMap[node.parent];
  var parentPath = parentIface ? nodeMap[parentIface.parent] : null;
  var pathStr = parentPath ? parentPath.label : '/org/freedesktop/systemd1';
  var ifaceStr = parentIface ? parentIface.label : '';

  var access = node.access || 'read';
  var canWrite = access === 'write' || access === 'readwrite';

  var dbusGet = 'dbus-send --system --print-reply \\\n  --dest=org.freedesktop.systemd1 \\\n  ' + pathStr + ' \\\n  org.freedesktop.DBus.Properties.Get \\\n  string:"' + ifaceStr + '" string:"' + node.label + '"';
  var dbusSet = 'dbus-send --system --print-reply \\\n  --dest=org.freedesktop.systemd1 \\\n  ' + pathStr + ' \\\n  org.freedesktop.DBus.Properties.Set \\\n  string:"' + ifaceStr + '" string:"' + node.label + '" \\\n  variant:string:"new-value"';

  var safeGet = dbusGet.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/'/g, "\\'");
  var safeSet = dbusSet.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/'/g, "\\'");

  var accessClass = access === 'read' ? 'read' : access === 'write' ? 'write' : 'readwrite';

  var setSection = '';
  if (canWrite) {
    setSection = '<div class="section-title">Set Property</div>' +
      '<div class="card">' +
        '<div style="padding:16px">' +
          '<div class="form-group"><label class="form-label">New Value <span class="type-hint">(variant)</span></label><input class="form-input" type="text" placeholder="Enter new value..." id="propNewValue"></div>' +
          '<div class="btn-group"><button class="btn danger" onclick="simulateSetProp()">Set Value</button></div>' +
        '</div>' +
      '</div>';
  }

  var setCopyBtn = canWrite ? '<button class="btn-sm" onclick="copyText(\'' + safeSet + '\')">Copy Set</button>' : '';

  return '<div class="pane-header">' +
    '<span class="pane-title">' + escapeHtml(node.label) + '</span>' +
    '<span class="bus-badge">System Bus</span>' +
    '<span class="tree-badge property" style="font-size:11px;padding:2px 8px">Property</span>' +
  '</div>' +

  '<div class="section-title">Property Information</div>' +
  '<div class="card" style="margin-bottom:0">' +
    '<div style="padding:12px 16px">' +
      '<div class="info-row"><span class="info-label">Interface</span><span class="info-value">' + escapeHtml(ifaceStr) + '</span></div>' +
      '<div class="info-row"><span class="info-label">Object Path</span><span class="info-value">' + escapeHtml(pathStr) + '</span></div>' +
      '<div class="info-row"><span class="info-label">Access</span><span class="info-value plain"><span class="access-badge ' + accessClass + '">' + access + '</span></span></div>' +
    '</div>' +
  '</div>' +

  '<div class="section-title">Get Property</div>' +
  '<div class="card">' +
    '<div style="padding:16px">' +
      '<div class="btn-group">' +
        '<button class="btn primary" onclick="simulateGetProp()">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>' +
          ' Get Value</button>' +
        '<button class="btn" onclick="copyText(document.getElementById(\'propResult\').textContent)">Copy Result</button>' +
      '</div>' +
      '<div style="margin-top:12px">' +
        '<div class="result-area empty" id="propResult">Click "Get Value" to retrieve the current value</div>' +
      '</div>' +
    '</div>' +
  '</div>' +

  setSection +

  '<div class="dbussend-header">' +
    '<span class="dbussend-label">dbus-send equivalent</span>' +
    '<button class="btn-sm" onclick="copyText(\'' + safeGet + '\')">Copy Get</button>' +
    setCopyBtn +
  '</div>' +
  '<div class="dbussend-preview"><pre>' + escapeHtml(dbusGet) + '</pre></div>';
}

// ── Simulated interactions ──
function simulateInvoke() {
  var area = document.getElementById('resultArea');
  area.className = 'result-area';
  area.textContent = 'Invoking...';
  area.style.color = 'var(--text-secondary)';

  setTimeout(function() {
    var selectedEl = document.querySelector('.tree-row.selected');
    var selectedId = selectedEl ? selectedEl.dataset.id : '';
    var result = '';
    if (selectedId === 'method-getunit') {
      result = 'method return time=1716249600000000\n\n   object path "/org/freedesktop/systemd1/unit/dbus_2eservice"';
    } else if (selectedId === 'method-startunit') {
      result = 'method return time=1716249600000000\n\n   object path "/org/freedesktop/systemd1/job/1234"';
    } else if (selectedId === 'method-get') {
      result = 'method return time=1716249600000000\n\n   variant       string "255"';
    } else if (selectedId === 'method-getall') {
      result = 'method return time=1716249600000000\n\n   array [\n      dict entry(\n         string "Version"\n         variant             string "255"\n      )\n      dict entry(\n         string "Features"\n         variant             string "+PAM +AUDIT..."\n      )\n   ]';
    } else {
      result = 'method return time=1716249600000000\n\n   (success)';
    }
    area.className = 'result-area success';
    area.style.color = '';
    area.textContent = result;
  }, 600);
}

function resetForm() {
  var inputs = document.querySelectorAll('.form-input');
  for (var i = 0; i < inputs.length; i++) {
    if (inputs[i].id === 'arg-name') inputs[i].value = 'dbus.service';
    else if (inputs[i].id === 'arg-mode') inputs[i].value = 'replace';
    else if (inputs[i].id === 'arg-pid') inputs[i].value = '1';
    else inputs[i].value = '';
  }
  var area = document.getElementById('resultArea');
  if (area) {
    area.className = 'result-area empty';
    area.style.color = '';
    area.textContent = 'Invoke the method to see the result here';
  }
}

function simulateGetProp() {
  var area = document.getElementById('propResult');
  area.className = 'result-area';
  area.textContent = 'Fetching...';
  area.style.color = 'var(--text-secondary)';

  setTimeout(function() {
    var selectedEl = document.querySelector('.tree-row.selected');
    var selectedId = selectedEl ? selectedEl.dataset.id : '';
    var result = '';
    if (selectedId === 'prop-version') result = 'variant  string "255"';
    else if (selectedId === 'prop-features') result = 'variant  string "+PAM +AUDIT +SELINUX +IMA +APPARMOR +SMACK +SYSVINIT +UTMP +LIBCRYPTSETUP +GCRYPT +GNUTLS +ACL +XZ +LZ4 +SECCOMP +BLKID +ELFUTILS +KMOD +IDN2 -IDN +PCRE2 default-hierarchy=unified"';
    else if (selectedId === 'prop-virtualization') result = 'variant  string "kvm"';
    else if (selectedId === 'prop-id') result = 'variant  string "dbus.service"';
    else if (selectedId === 'prop-activestate') result = 'variant  string "active"';
    else if (selectedId === 'prop-substate') result = 'variant  string "running"';
    else if (selectedId === 'prop-loadstate') result = 'variant  string "loaded"';
    else if (selectedId === 'prop-description') result = 'variant  string "D-Bus System Message Bus"';
    else if (selectedId === 'prop-type') result = 'variant  string "dbus"';
    else if (selectedId === 'prop-mainpid') result = 'variant  uint32 1234';
    else if (selectedId === 'prop-state') result = 'variant  string "running"';
    else if (selectedId === 'prop-jobtype') result = 'variant  string "start"';
    else result = 'variant  string "(value)"';
    area.className = 'result-area success';
    area.style.color = '';
    area.textContent = result;
  }, 500);
}

function simulateSetProp() {
  var el = document.getElementById('propNewValue');
  if (!el || !el.value) { showToast('Please enter a value'); return; }
  showToast('Property set (simulated)');
}

function toggleSubscribe(btn) {
  var status = document.getElementById('subscribeStatus');
  if (btn.classList.contains('success')) {
    btn.className = 'btn danger';
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13.73 21a2 2 0 0 1-3.46 0"/><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><line x1="1" y1="1" x2="23" y2="23"/></svg> Unsubscribe';
    status.textContent = 'Listening for signals...';
    status.style.color = 'var(--green)';
  } else {
    btn.className = 'btn success';
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg> Subscribe';
    status.textContent = 'Click to start receiving this signal';
    status.style.color = '';
  }
}

// ── Init ──
initTree();
setTimeout(function() {
  var serviceRow = document.querySelector('.tree-row[data-id="service"]');
  if (serviceRow) selectNode('service', serviceRow);
}, 100);
</script>
